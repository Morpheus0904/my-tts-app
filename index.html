            50% { box-shadow: 0 0 20px 8px rgba(232,130,90,0.35); }

            gap: 12px 20px;
            padding: 12px 16px;
            background: #f5f9ee;
            border-radius: 18px;
            margin-bottom: 12px;

            font-weight: 600;
            padding: 6px 18px;
            background: #e3f0fa;
            border-radius: 30px;

        }

            padding: 12px 20px;
            background: #f5f0eb;
            border-radius: 16px;
            margin: 8px 0;
            cursor: pointer;

            font-size: 20px;
            font-weight: 700;
            color: #5a3e2b;
            margin: 18px 0 10px 0;
            padding-left: 12px;
            border-left: 6px solid #e8825a;
            cursor: pointer;

            margin: 8px 0;

    // ================================================================
    // 2. 发音函数（调用后端 /tts 接口）
    // ================================================================
    async function speakPinyin(text) {
        if (!text) return;
        try {
            const resp = await fetch(`/tts?text=${encodeURIComponent(text)}`);
            if (!resp.ok) {
                const errText = await resp.text();
                alert('发音失败: ' + errText);
                return;
            }
            const arrayBuffer = await resp.arrayBuffer();
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(audioCtx.destination);
            source.start();
        } catch (err) {
            console.error('发音错误:', err);
            alert('发音失败，请检查网络或服务器状态');
        }
    }

    let currentDay = 1;

    function renderDay(dayNum) {
        const data = DAYS[dayNum];
        if (!data) return;
        const container = document.getElementById('content');
        let html = `<h2 style="color:#4a2c1a;margin-bottom:16px;">第${dayNum}天 · ${data.title}</h2>`;

        for (const sec of data.sections) {
            if (sec.type === 'title') {
                html += `<div class="section-title" onclick="speakPinyin('${sec.text}')">${sec.text}</div>`;
            } else if (sec.type === 'pinyin') {
                html += `<div class="pinyin-grid">`;
                for (const item of sec.items) {
                    html += `<span class="pinyin-item" onclick="speakPinyin('${item}')">${item}</span>`;
                }
                html += `</div>`;
            } else if (sec.type === 'words') {
                html += `<div class="word-group">`;
                for (const w of sec.items) {
                    const parts = w.split(' ');
                    const meaning = parts.pop();
                    const pinyin = parts.join(' ');
                    html += `<span class="word-item" onclick="speakPinyin('${pinyin}')">${w}</span>`;
                }
                html += `</div>`;
            } else if (sec.type === 'compare') {
                html += `<div class="compare-group">`;
                for (const item of sec.items) {
                    const parts = item.split('---');
                    for (const p of parts) {
                        html += `<span class="pinyin-item" onclick="speakPinyin('${p}')">${p}</span>`;
                    }
                    html += `<span style="color:#b08870;font-weight:400;">&nbsp;|&nbsp;</span>`;
                }
                html += `</div>`;
            } else if (sec.type === 'sentence') {
                for (const s of sec.items) {
                    html += `<div class="sentence" onclick="speakPinyin('${s}')">${s}</div>`;
                }
            } else if (sec.type === 'poem') {
                html += `<div class="poem-block">`;
                for (const line of sec.lines) {
                    html += `<div class="poem-line" onclick="speakPinyin('${line}')">${line}</div>`;
                }
                html += `</div>`;
            }
        }

        container.innerHTML = html;
        document.querySelectorAll('.day-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.day) === dayNum);
        });
    }

    function buildTabs() {
        const tabs = document.getElementById('dayTabs');
        let html = '';
        for (let i = 1; i <= 14; i++) {
            if (!DAYS[i]) continue;
            const active = i === currentDay ? 'active' : '';
            html += `<button class="day-btn ${active}" data-day="${i}">第${i}天</button>`;
        }
        tabs.innerHTML = html;
        tabs.querySelectorAll('.day-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const day = parseInt(this.dataset.day);
                currentDay = day;
                renderDay(day);
            });
        });
    }

    buildTabs();
    renderDay(1);
    window.speakPinyin = speakPinyin;
</script>
</body>
</html>
